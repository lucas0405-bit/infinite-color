<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🌈 無盡色彩</title>
<style>
body, html { margin: 0; padding: 0; background: #000; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
.color-block {
height: 100vh;
width: 100vw;
display: flex;
align-items: center;
justify-content: center;
}
</style>
</head>
<body>
<div id="container"></div>
<script>
let hue = 0;
const container = document.getElementById('container');
function addBlocks() {
for(let i = 0; i < 5; i++) {
const div = document.createElement('div');
div.className = 'color-block';
div.style.background = `linear-gradient(180deg, hsl(${hue}, 80%, 55%), hsl(${(hue + 20) % 360}, 80%, 55%))`;
container.appendChild(div);
hue = (hue + 20) % 360;
}
}
addBlocks();
window.onscroll = () => {
if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 1000) {
addBlocks();
}
};
</script>
</body>
</html>
