<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        /* 1. 把背景設為最後一次出現的顏色，而不是黑色，這樣閃爍就不明顯 */
        body, html { 
            margin: 0; 
            padding: 0; 
            background: hsl(0, 70%, 50%); 
            transition: background 0.5s; /* 背景色跟著變，消滅黑色斷層 */
        }
        .block { 
            height: 100vh; 
            width: 100vw; 
            contain: paint; /* 優化效能：告訴瀏覽器這塊只管畫色塊 */
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        let h = 0;
        const app = document.getElementById('app');

        function add(count = 5) {
            for(let i=0; i < count; i++) {
                const d = document.createElement('div');
                d.className = 'block';
                const currentColor = `hsl(${h}, 70%, 50%)`;
                d.style.backgroundColor = currentColor;
                app.appendChild(d);
                
                // 2. 同步更新 body 背景色，萬一滑太快，底下漏出來的也是當前色系
                document.body.style.backgroundColor = currentColor;
                h = (h + 25) % 360;
            }
        }

        // 3. 初始多載入一點，預留緩衝空間
        add(15); 

        window.onscroll = () => {
            // 4. 提早觸發：原本是快到底才加，現在改成「距離底部還有 2 個螢幕高度」就加
            if ((window.innerHeight + window.pageYOffset) >= document.body.offsetHeight - (window.innerHeight * 2)) {
                // 使用 requestAnimationFrame 讓渲染更絲滑
                window.requestAnimationFrame(() => add(5));
            }
        };
    </script>
</body>
</html>
